name: ecot_trade
description: Ecotrade - Circular Economy Waste Marketplace for Kigali
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # State Management
  flutter_riverpod: ^2.5.1

  # UI & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # Storage & Offline
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  sqflite: ^2.3.3

  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.3
  connectivity_plus: ^5.0.2

  # Utilities
  intl: ^0.19.0
  image_picker: ^1.0.7
  permission_handler: ^11.3.1
  geolocator: ^11.0.0
  url_launcher: ^6.2.6
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  flutter_local_notifications: ^17.2.1+2
  pinput: ^5.0.0
  flutter_rating_bar: ^4.0.1
  percent_indicator: ^4.2.3
  fl_chart: ^0.67.0
  timeline_tile: ^2.0.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.11
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
