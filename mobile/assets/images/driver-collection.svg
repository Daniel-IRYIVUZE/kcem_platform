<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#eff6ff"/>
  <g transform="translate(50, 60)">
    <!-- Truck body -->
    <rect x="30" y="50" width="150" height="80" fill="#dc2626" stroke="#991b1b" stroke-width="2" rx="5"/>
    <!-- Cabin -->
    <rect x="170" y="40" width="50" height="60" fill="#dc2626" stroke="#991b1b" stroke-width="2" rx="3"/>
    <!-- Windows -->
    <rect x="180" y="48" width="15" height="15" fill="#0ea5e9"/>
    <rect x="200" y="48" width="15" height="15" fill="#0ea5e9"/>
    <!-- Wheels -->
    <circle cx="60" cy="130" r="10" fill="#1f2937" stroke="#111827" stroke-width="2"/>
    <circle cx="100" cy="130" r="10" fill="#1f2937" stroke="#111827" stroke-width="2"/>
    <circle cx="170" cy="130" r="10" fill="#1f2937" stroke="#111827" stroke-width="2"/>
    <!-- Cargo indicator -->
    <rect x="40" y="60" width="130" height="60" fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5,5"/>
    <!-- Load indicator -->
    <text x="100" y="95" font-size="24" fill="#fbbf24" text-anchor="middle" font-weight="bold">75%</text>
  </g>
</svg>