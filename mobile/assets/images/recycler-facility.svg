<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#ecfdf5"/>
  <g transform="translate(50, 40)">
    <!-- Main factory building -->
    <rect x="40" y="60" width="160" height="100" fill="#bfdbfe" stroke="#1e40af" stroke-width="2"/>
    <!-- Chimney -->
    <rect x="100" y="20" width="20" height="40" fill="#64748b" stroke="#334155" stroke-width="1"/>
    <circle cx="110" cy="15" r="6" fill="#94a3b8"/>
    <!-- Processing equipment -->
    <rect x="15" y="100" width="20" height="30" fill="#f97316"/>
    <rect x="50" y="95" width="25" height="35" fill="#f97316"/>
    <!-- Conveyor belt -->
    <line x1="20" y1="130" x2="80" y2="130" stroke="#64748b" stroke-width="3"/>
    <!-- Storage containers -->
    <rect x="210" y="110" width="30" height="25" fill="#10b981"/>
    <rect x="250" y="110" width="30" height="25" fill="#3b82f6"/>
  </g>
</svg>